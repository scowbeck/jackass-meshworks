<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JM Logo Animation</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4e7d3; /* your tan background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .logo {
      width: 320px;      /* adjust as needed */
      height: auto;
      image-rendering: crisp-edges;
      image-rendering: -webkit-optimize-contrast;
    }
  </style>
</head>

<body>
  <img class="logo" src="assets/JM_logo_ani.webp" alt="JM Logo Animation">
</body>
</html>
